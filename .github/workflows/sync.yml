name: Synchronisation Hevy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Exécution du script
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        run: python sync.py

      - name: Commit des données
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/

          git diff --cached --quiet || git commit -m "Mise à jour des données Hevy"

          git push
